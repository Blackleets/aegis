<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111A"/>
      <stop offset="100%" stop-color="#03070D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F5D76E"/>
      <stop offset="55%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00A9D1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <g opacity="0.18" stroke="#D4AF37" fill="none">
    <circle cx="256" cy="256" r="184"/>
    <circle cx="256" cy="256" r="152"/>
  </g>

  <g transform="translate(256 242)">
    <polygon points="0,-150 126,-78 126,78 0,150 -126,78 -126,-78" fill="none" stroke="url(#gold)" stroke-width="16"/>
    <polygon points="0,-108 92,-54 92,54 0,108 -92,54 -92,-54" fill="none" stroke="url(#cyan)" stroke-width="8" opacity="0.9"/>
    <path d="M0 -88 L62 18 L-62 18 Z" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linejoin="round" filter="url(#glow)"/>
    <path d="M0 -38 L34 18 L-34 18 Z" fill="none" stroke="url(#cyan)" stroke-width="10" stroke-linejoin="round"/>
    <circle cx="0" cy="42" r="18" fill="url(#gold)"/>
    <path d="M-78 92 L78 92" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
  </g>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <text x="256" y="438" font-size="42" letter-spacing="14" fill="#D4AF37" font-weight="700">AEGIS</text>
    <text x="256" y="470" font-size="16" letter-spacing="7" fill="#7AA6B8" opacity="0.8">INTELLIGENCE SURFACE</text>
  </g>
</svg>
